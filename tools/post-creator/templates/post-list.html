{{define "content"}}
<div class="post-list-header">
    <h1>Posts</h1>
    <button id="new-post-btn" class="btn-primary" onclick="document.getElementById('new-post-form').classList.toggle('hidden')">+ New Post</button>
</div>

<div id="new-post-form" class="new-post-form hidden">
    <form hx-post="/api/posts/create" hx-target="body" hx-swap="outerHTML">
        <div class="form-row">
            <label>Title</label>
            <input type="text" name="title" placeholder="Post title..." required>
        </div>
        <div class="form-row">
            <label>Tags</label>
            <div class="tag-input-wrap" data-tag-input>
                <span class="tag-pills"></span>
                <input type="text" class="tag-text" placeholder="Type a tag and press space..." autocomplete="off">
                <div class="tag-suggestions"></div>
            </div>
        </div>
        <button type="submit" class="btn-primary">Create</button>
    </form>
</div>

<div id="post-list">
    {{template "post-filter" .}}
</div>

<script src="/static/tag-input.js"></script>
{{end}}
