{{ with .Site.Params.about }}
<div class="aside__about">
<h1 class="about__title">{{ .title }}</h1>
{{ with .logo_image }}<img class="about__logo" src="{{ . | absURL }}" alt="Photo of {{ $.Site.Params.about.title }}">{{ end }}
{{ with .description }}<p class="about__description">{{ . | markdownify }}</p>{{ end }}
</div>
{{ end }}

<ul class="aside__social-links">
    {{ range $item := .Site.Params.socialLinks }}
    <li>
        <a href="{{ $item.url }}" rel="me" aria-label="{{ $item.title }}" title="{{ $item.title }}"><i class="{{ $item.icon }}" aria-hidden="true"></i> {{ $item.title }}</a>
    </li>
    {{ end }}
</ul>

<!-- Activity Calendar -->
<h2 class="acal-title">Activity Calendar</h2>
<div id="activity-cal">
  <div class="acal-header">
    <button class="acal-arrow" id="acal-prev" aria-label="Previous month">&lsaquo;</button>
    <span class="acal-month-label" id="acal-label"></span>
    <button class="acal-arrow" id="acal-next" aria-label="Next month">&rsaquo;</button>
  </div>
  <div class="acal-grid" id="acal-grid"></div>
  <div class="acal-legend">
    <span class="acal-legend-item"><span class="acal-legend-git"></span> git</span>
    <span class="acal-legend-item"><span class="acal-legend-post"></span> post</span>
  </div>
</div>

<script>
window.acalData = {
  postSet: {
    {{ range where .Site.RegularPages "Section" "posts" }}
    "{{ .Date.Format "2006-01-02" }}": true,
    {{ end }}
  },
  events: {{ with .Site.Data.github_events }}{{ . | jsonify | safeJS }}{{ else }}[]{{ end }}
};
</script>
<script src="{{ "js/activity-cal.js" | absURL }}"></script>
