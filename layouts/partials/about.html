{{ with .Site.Params.about }}
<div class="aside__about">
<h1 class="about__title">{{ .title }}</h1>
{{ with .logo_image }}<img class="about__logo" src="{{ . | absURL }}" alt="Photo of {{ $.Site.Params.about.title }}">{{ end }}
{{ with .description }}<p class="about__description">{{ . | markdownify }}</p>{{ end }}
</div>
{{ end }}

<ul class="aside__social-links">
    {{ range $item := .Site.Params.socialLinks }}
    <li>
        <a href="{{ $item.url }}" rel="me" aria-label="{{ $item.title }}" title="{{ $item.title }}"><i class="{{ $item.icon }}" aria-hidden="true"></i> {{ $item.title }}</a>
    </li>
    {{ end }}
</ul>

<!-- Activity Calendar -->
<h2 class="acal-title">Activity Calendar</h2>
<div id="activity-cal">
  <div class="acal-header">
    <button class="acal-arrow" id="acal-prev" aria-label="Previous month">&lsaquo;</button>
    <span class="acal-month-label" id="acal-label"></span>
    <button class="acal-arrow" id="acal-next" aria-label="Next month">&rsaquo;</button>
  </div>
  <div class="acal-grid" id="acal-grid"></div>
  <div class="acal-legend">
    <span class="acal-legend-item"><span class="acal-legend-git"></span> git</span>
    <span class="acal-legend-item"><span class="acal-legend-post"></span> post</span>
  </div>
</div>

<style>
  .acal-title {
    margin-top: 1rem;
    padding-top: 0.8rem;
    border-top: 1px solid var(--border, #e0e0e0);
    font-size: 0.9rem;
    margin-bottom: 0.4rem;
  }
  #activity-cal {
  }
  .acal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.4rem;
  }
  .acal-month-label {
    font-size: 0.8rem;
    font-weight: 600;
  }
  .acal-arrow {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1.1rem;
    padding: 0 0.4rem;
    color: inherit;
    line-height: 1;
  }
  .acal-arrow:hover {
    opacity: 0.6;
  }
  .acal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 1px;
  }
  .acal-dow {
    font-size: 0.55rem;
    text-align: center;
    opacity: 0.5;
    padding: 1px 0;
  }
  .acal-cell {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    aspect-ratio: 1;
    font-size: 0.65rem;
  }
  .acal-num {
    position: relative;
    z-index: 1;
  }
  .acal-cell .git-circle {
    position: absolute;
    border-radius: 50%;
    background: rgba(46, 160, 67, 0.18);
    border: 1.5px solid rgba(46, 160, 67, 0.55);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .acal-cell .post-dot {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #3b82f6;
  }
  .acal-legend {
    display: flex;
    gap: 0.8rem;
    margin-top: 0.3rem;
    font-size: 0.6rem;
    opacity: 0.6;
  }
  .acal-legend-item {
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .acal-legend-git {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: rgba(46, 160, 67, 0.18);
    border: 1.5px solid rgba(46, 160, 67, 0.55);
  }
  .acal-legend-post {
    display: inline-block;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #3b82f6;
  }
</style>

<script>
(function() {
  var postSet = {};
  {{ range where .Site.RegularPages "Section" "posts" }}
  postSet["{{ .Date.Format "2006-01-02" }}"] = true;
  {{ end }}

  var commitMap = {};
  var currentDate = new Date();
  var viewYear = currentDate.getFullYear();
  var viewMonth = currentDate.getMonth();

  // bounds: current month and 2 months back
  var maxYear = viewYear;
  var maxMonth = viewMonth;
  var minDate = new Date(currentDate.getFullYear(), currentDate.getMonth() - 2, 1);
  var minYear = minDate.getFullYear();
  var minMonth = minDate.getMonth();

  var gridEl = document.getElementById('acal-grid');
  var labelEl = document.getElementById('acal-label');
  var prevBtn = document.getElementById('acal-prev');
  var nextBtn = document.getElementById('acal-next');

  var monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var dayNames = ['Mo','Tu','We','Th','Fr','Sa','Su'];

  function pad(n) { return n < 10 ? '0' + n : '' + n; }

  function render() {
    while (gridEl.firstChild) gridEl.removeChild(gridEl.firstChild);

    labelEl.textContent = monthNames[viewMonth] + ' ' + viewYear;

    var counts = Object.values(commitMap);
    var maxCommits = counts.length ? Math.max.apply(null, counts) : 1;

    dayNames.forEach(function(dn) {
      var d = document.createElement('div');
      d.className = 'acal-dow';
      d.textContent = dn;
      gridEl.appendChild(d);
    });

    var daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
    var startDay = new Date(viewYear, viewMonth, 1).getDay() - 1;
    if (startDay < 0) startDay = 6;

    for (var e = 0; e < startDay; e++) {
      var empty = document.createElement('div');
      empty.className = 'acal-cell';
      gridEl.appendChild(empty);
    }

    for (var day = 1; day <= daysInMonth; day++) {
      var dateStr = viewYear + '-' + pad(viewMonth + 1) + '-' + pad(day);
      var commits = commitMap[dateStr] || 0;
      var hasPost = postSet[dateStr] || false;

      var cell = document.createElement('div');
      cell.className = 'acal-cell';

      if (commits > 0) {
        var minPct = 55;
        var maxPct = 90;
        var pct = minPct + (maxPct - minPct) * (commits / maxCommits);
        var circle = document.createElement('div');
        circle.className = 'git-circle';
        circle.style.width = pct + '%';
        circle.style.height = pct + '%';
        cell.appendChild(circle);
      }

      var num = document.createElement('span');
      num.className = 'acal-num';
      num.textContent = day;
      cell.appendChild(num);

      if (hasPost) {
        var dot = document.createElement('div');
        dot.className = 'post-dot';
        cell.appendChild(dot);
      }

      gridEl.appendChild(cell);
    }
  }

  function updateArrows() {
    prevBtn.disabled = (viewYear === minYear && viewMonth === minMonth);
    nextBtn.disabled = (viewYear === maxYear && viewMonth === maxMonth);
    prevBtn.style.opacity = prevBtn.disabled ? '0.25' : '1';
    nextBtn.style.opacity = nextBtn.disabled ? '0.25' : '1';
  }

  prevBtn.addEventListener('click', function() {
    if (viewYear === minYear && viewMonth === minMonth) return;
    viewMonth--;
    if (viewMonth < 0) { viewMonth = 11; viewYear--; }
    render();
    updateArrows();
  });

  nextBtn.addEventListener('click', function() {
    if (viewYear === maxYear && viewMonth === maxMonth) return;
    viewMonth++;
    if (viewMonth > 11) { viewMonth = 0; viewYear++; }
    render();
    updateArrows();
  });

  // GitHub events baked in at build time from data/github_events.json
  var events = {{ with .Site.Data.github_events }}{{ . | jsonify }}{{ else }}[]{{ end }};
  if (Array.isArray(events)) {
    events.forEach(function(ev) {
      if (ev.type === 'PushEvent') {
        var date = ev.created_at.slice(0, 10);
        var count = (ev.payload && ev.payload.commits) ? ev.payload.commits.length : 1;
        commitMap[date] = (commitMap[date] || 0) + count;
      }
    });
  }
  render();
  updateArrows();
})();
</script>
