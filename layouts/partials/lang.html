<style>
.terminal-row {
    color: #4af626;
    font-family: monospace;
    line-height: 1.4;
}

.terminal-row .command {
    opacity: 0.7;
}

.terminal-output {
    display: inline-block;
    position: relative;
    min-width: 18ch;
    height: 1.4em;
    vertical-align: bottom;
}

.terminal-output span {
    position: absolute;
    left: 0;
    top: 0;
    opacity: 0;
    animation: cycle 10s infinite;
    white-space: nowrap;
    font-weight: bold;
}

.terminal-output span:nth-child(1) { animation-delay: 0s; }
.terminal-output span:nth-child(2) { animation-delay: 2s; }
.terminal-output span:nth-child(3) { animation-delay: 4s; }
.terminal-output span:nth-child(4) { animation-delay: 6s; }
.terminal-output span:nth-child(5) { animation-delay: 8s; }

@keyframes cycle {
    0%   { opacity: 0; }
    2%   { opacity: 1; }
    16%  { opacity: 1; }
    20%  { opacity: 0; }
    100% { opacity: 0; }
}

.terminal-output::after {
    content: "█";
    animation: blink 1s step-end infinite;
}

@keyframes blink {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0; }
}
</style>

<p class="terminal-row">
    <br/>
    <span class="command">$ echo $USER</span><br/>
    <span class="terminal-output">
        <span>ZAID</span>
        <span>SANI</span>
        <span>MOVIE_BUFF</span>
        <span>DEVOPS_ENGINEER</span>
        <span>SELF_TAUGHT</span>
    </span>
    <br/>
</p>
<br /><br />
