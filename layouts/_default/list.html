{{ define "main" }}
    <header class="post-header">
        <h1 class="post-header__title">{{ .Title | markdownify }}</h1>
    </header>

    {{ .Content }}

    <ul>
    {{ range .Pages }}
        {{ .Render "li" }}
    {{ end }}
    </ul>

{{ end }}

{{define "aside" }}
    {{ if .Params.description }}<p>{{ .Params.description }}</p>{{ end }}
{{ end }}
